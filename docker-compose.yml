services:
  mongodb:
    image: mongo:latest
    container_name: taskboard_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskboard_network

  redis:
    image: redis:alpine
    container_name: taskboard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taskboard_network

  server:
    build:
      context: ./server
    container_name: taskboard_server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/taskboard
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
      - redis
    networks:
      - taskboard_network

  client:
    build:
      context: ./client
    container_name: taskboard_client
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - taskboard_network

networks:
  taskboard_network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
